global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Kong Data Plane metrics
  - job_name: kong
    static_configs:
      - targets: ['kong-dp:8100']
    metrics_path: /metrics

  # Fraud API custom metrics (Phase 6)
  - job_name: fraud-api
    static_configs:
      - targets: ['fraud-api:9000']
    metrics_path: /metrics
